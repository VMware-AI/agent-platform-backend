mutation UpdateModelRoute($id: ID!, $input: UpdateModelRouteInput!) {
    updateModelRoute(id: $id, input: $input) {
      ...ModelRouteFields
    }
  }
  
  fragment ModelRouteFields on ModelRoute {
    id
    name
    backendGatewayId
    supportedModels
    uiStrategy
    enabled
    createdAt
    updatedAt
  }

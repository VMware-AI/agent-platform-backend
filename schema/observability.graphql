# Request logs (请求日志). 0619.

type RequestLog {
  id: ID!
  requestId: String!
  userId: ID
  agentId: ID
  model: String
  inputTokens: Int!
  outputTokens: Int!
  latencyMs: Int!
  statusCode: Int!
  detail: String
  createdAt: Time!
}

input RecordRequestLogInput {
  requestId: String!
  userId: ID
  agentId: ID
  model: String
  inputTokens: Int
  outputTokens: Int
  latencyMs: Int
  statusCode: Int!
  detail: String
}

input RequestLogFilter {
  statusCode: Int
  agentId: ID
  model: String
  requestId: String
  userId: ID
  # createdAt window (inclusive); either bound may be omitted.
  from: Time
  to: Time
  # status band, translated to a code range server-side (2xx/4xx/5xx).
  statusClass: RequestStatusClass
}

# HTTP status band for filtering (avoids exposing raw code ranges to the client).
enum RequestStatusClass {
  SUCCESS # 2xx
  CLIENT_ERROR # 4xx
  SERVER_ERROR # 5xx
}

# Paged request logs with a real total for offset/limit pagination.
type RequestLogConnection {
  items: [RequestLog!]!
  total: Int!
}

enum RequestMetricsBucketGranularity { MINUTE HOUR DAY }

type RequestMetricsBucket {
  timestamp: Time!
  requestCount: Int!
  errorCount: Int!
  avgLatencyMs: Int!
  p95LatencyMs: Int!
  inputTokensTotal: Int!
  outputTokensTotal: Int!
}

type RequestMetricsSummary {
  totalRequests: Int!
  totalErrors: Int!
  errorRate: Float!
  avgLatencyMs: Int!
  p50LatencyMs: Int!
  p95LatencyMs: Int!
  p99LatencyMs: Int!
  totalInputTokens: Int!
  totalOutputTokens: Int!
}

# One upstream deployment's health as litellm reports it (GET /health).
type EndpointHealth {
  model: String!
  apiBase: String
}

# A gateway's health, aggregated by the backend fanning out to litellm's
# /health (LLD-15 T4). reachable reflects /health/readiness; the endpoint lists
# come from /health (litellm probes its upstreams).
type GatewayHealth {
  gatewayId: ID!
  gatewayName: String!
  reachable: Boolean!
  healthyCount: Int!
  unhealthyCount: Int!
  healthy: [EndpointHealth!]!
  unhealthy: [EndpointHealth!]!
  error: String
}

type RequestMetrics {
  rangeStart: Time!
  rangeEnd: Time!
  granularity: RequestMetricsBucketGranularity!
  buckets: [RequestMetricsBucket!]!
  summary: RequestMetricsSummary!
}

input RequestMetricsFilter {
  statusCode: Int
  agentId: ID
  model: String
}

extend type Query {
  requestLogs(filter: RequestLogFilter, page: PageInput): RequestLogConnection! @hasPermission(perm: "audit:view")
  requestMetrics(from: Time!, to: Time!, granularity: RequestMetricsBucketGranularity!, filter: RequestMetricsFilter): RequestMetrics! @hasPermission(perm: "audit:view")
  # Upstream health across every configured gateway (fan-out to litellm /health).
  gatewayHealth: [GatewayHealth!]! @hasPermission(perm: "audit:view")
}

extend type Mutation {
  recordRequestLog(input: RecordRequestLogInput!): RequestLog! @hasRole(any: [admin])
}

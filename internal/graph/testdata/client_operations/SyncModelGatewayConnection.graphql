mutation SyncModelGatewayConnection($id: ID!) {
    syncModelGatewayConnection(id: $id) {
      success
      message
      gateway {
        ...ModelGatewayFields
      }
    }
  }
  
  fragment ModelGatewayFields on ModelGateway {
    id
    name
    provider
    endpoint
    backendModelCount
    loadBalancingStrategy
    lastSyncAt
    lastSyncStatus
    lastSyncMessage
    createdAt
    updatedAt
  }

query AgentConfigs($agentType: String) {
    agentConfigs(agentType: $agentType) {
      ...AgentConfigFields
    }
  }
  
  fragment AgentConfigFields on AgentConfig {
    id
    name
    agentType
    isDefault
    artifactId
    knowledge {
      ...KnowledgeArtifactFields
    }
    createdAt
  }
  
  fragment KnowledgeArtifactFields on Artifact {
    id
    name
    kind
    version
    uri
    sha256
    createdAt
  }

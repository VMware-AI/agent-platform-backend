# Compute gateway routing (算力网关): connections, upstreams, model routes,
# and the difficulty router. See LLD-07. The development focus.

enum GatewayStatus {
  connected
  disconnected
  error
}
enum LoadBalanceStrategy {
  simple_shuffle
  latency
  usage_v2
  least_busy
  cost
}
enum UpstreamProvider {
  vllm
  openai
  anthropic
  minimax
  codex
}
enum RouterTierLevel {
  SIMPLE
  MEDIUM
  COMPLEX
  REASONING
}

# Console-facing load-balancing strategy for a model route (模型路由 page). Distinct
# from the litellm LoadBalanceStrategy: a friendly, gateway-agnostic choice the
# operator picks in the UI and the backend round-trips verbatim.
enum ModelRouteStrategy {
  ROUND_ROBIN
  WEIGHTED_ROUND_ROBIN
  RANDOM
}

type GatewayConnection {
  id: ID!
  name: String!
  endpoint: String!
  status: GatewayStatus!
  loadBalanceStrategy: LoadBalanceStrategy!
  createdAt: Time!
}

type Upstream {
  id: ID!
  name: String!
  provider: UpstreamProvider!
  apiBase: String
  model: String!
  enabled: Boolean!
  createdAt: Time!
}

type ModelRoute {
  id: ID!
  name: String!
  modelAlias: String!
  backendGatewayId: ID
  # Display name of the serving gateway (console 模型路由 list).
  gatewayName: String!
  upstreams: [String!]!
  # Console alias for `upstreams` — the models this route can serve (模型路由 page).
  supportedModels: [String!]!
  strategy: LoadBalanceStrategy!
  # Console-facing load-balancing strategy (模型路由 page).
  uiStrategy: ModelRouteStrategy!
  enabled: Boolean!
  createdAt: Time!
  updatedAt: Time!
}

type RouterTier {
  id: ID!
  tier: RouterTierLevel!
  modelAlias: String!
}

input RegisterGatewayConnectionInput {
  name: String!
  endpoint: String!
  # litellm master key(接入表单填写)→ 后端写 secret store,只存引用,明文不落库;
  # 优先于 masterKeyRef。
  masterKey: String
  masterKeyRef: String
  loadBalanceStrategy: LoadBalanceStrategy
}
input UpsertUpstreamInput {
  name: String!
  provider: UpstreamProvider!
  apiBase: String
  # 上游 API key(上游表单填写)→ 后端写 secret store,只存引用,明文不落库;
  # 优先于 apiKeyRef。
  apiKey: String
  apiKeyRef: String
  model: String!
  enabled: Boolean
}
input UpsertModelRouteInput {
  name: String!
  modelAlias: String!
  backendGatewayId: ID
  upstreams: [String!]
  strategy: LoadBalanceStrategy
  enabled: Boolean
}

# Console 模型路由 create form (创建路由). modelAlias defaults to name when omitted;
# supportedModels are stored as the route's upstream group.
input CreateModelRouteInput {
  name: String!
  backendGatewayId: ID
  gatewayName: String
  supportedModels: [String!]
  uiStrategy: ModelRouteStrategy
  enabled: Boolean
}

# Console 模型路由 edit form (编辑路由). All fields optional — only set ones change.
input UpdateModelRouteInput {
  name: String
  backendGatewayId: ID
  gatewayName: String
  supportedModels: [String!]
  uiStrategy: ModelRouteStrategy
  enabled: Boolean
}

extend type Query {
  gatewayConnections: [GatewayConnection!]! @hasRole(any: [admin])
  upstreams: [Upstream!]! @hasPermission(perm: "route:manage")
  modelRoutes: [ModelRoute!]! @hasPermission(perm: "route:manage")
  routerTiers: [RouterTier!]! @hasPermission(perm: "route:manage")
}

extend type Mutation {
  registerGatewayConnection(input: RegisterGatewayConnectionInput!): GatewayConnection! @hasRole(any: [admin])
  testGatewayConnection(id: ID!): GatewayStatus! @hasRole(any: [admin])
  deleteGatewayConnection(id: ID!): Boolean! @hasRole(any: [admin])

  upsertUpstream(input: UpsertUpstreamInput!): Upstream! @hasPermission(perm: "route:manage")
  deleteUpstream(id: ID!): Boolean! @hasPermission(perm: "route:manage")
  upsertModelRoute(input: UpsertModelRouteInput!): ModelRoute! @hasPermission(perm: "route:manage")
  # Console 模型路由 page CRUD (创建/编辑路由). create mints a new route by id;
  # update edits an existing one by id (distinct from the name-keyed upsert above).
  createModelRoute(input: CreateModelRouteInput!): ModelRoute! @hasPermission(perm: "route:manage")
  updateModelRoute(id: ID!, input: UpdateModelRouteInput!): ModelRoute! @hasPermission(perm: "route:manage")
  setModelRouteEnabled(id: ID!, enabled: Boolean!): ModelRoute! @hasPermission(perm: "route:manage")
  deleteModelRoute(id: ID!): Boolean! @hasPermission(perm: "route:manage")

  # The difficulty router: map a tier to a model alias → syncs litellm Complexity Router.
  setRouterTier(tier: RouterTierLevel!, modelAlias: String!): RouterTier! @hasPermission(perm: "route:manage")
}

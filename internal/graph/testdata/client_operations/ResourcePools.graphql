fragment ResourcePoolFields on ResourcePool {
    id
    name
    endpoint
    contentLibraryName
    insecure
    syncStatus
    lastSyncedAt
    createdAt
    updatedAt
  }

  query ResourcePools(
    $filter: ResourcePoolFilter
    $pagination: Pagination
    $sort: ResourcePoolSort
  ) {
    resourcePools(filter: $filter, pagination: $pagination, sort: $sort) {
      nodes {
        ...ResourcePoolFields
      }
      totalCount
      pageInfo {
        page
        pageSize
        totalPages
      }
    }
  }

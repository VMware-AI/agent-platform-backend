fragment AccountUserFields on AccountUser {
    id
    username
    displayName
    email
    role {
      id
      name
    }
    connectionStatus
    lastLoginAt
    enabled
    createdAt
    updatedAt
  }

  mutation ToggleUserEnabled($id: ID!) {
    toggleUserEnabled(id: $id) {
      user {
        ...AccountUserFields
      }
    }
  }

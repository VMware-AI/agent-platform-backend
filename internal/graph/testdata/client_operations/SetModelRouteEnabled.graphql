mutation SetModelRouteEnabled($id: ID!, $enabled: Boolean!) {
    setModelRouteEnabled(id: $id, enabled: $enabled) {
      ...ModelRouteFields
    }
  }
  
  fragment ModelRouteFields on ModelRoute {
    id
    name
    backendGatewayId
    supportedModels
    uiStrategy
    enabled
    createdAt
    updatedAt
  }

# Resource pool (vCenter) registration + inventory. See LLD-03 / LLD-06, 0619 第13页.
# Shape aligned to the console 资源池 page (重蒙皮 P3): entity + connection + payloads.

# Console connection status is binary (CONNECTED / DISCONNECTED). The ent column
# keeps a third "error" state for accuracy; the GraphQL projection collapses it
# to DISCONNECTED (see toModelResourcePool).
enum PoolConnectionStatus {
  CONNECTED
  DISCONNECTED
}

# Inventory-sync state, distinct from connectionStatus. Derived: never synced →
# NEVER; last sync ok → SYNCED; last sync errored → FAILED. (SYNCING/PARTIAL are
# part of the console enum but the backend's sync is synchronous, so it never
# produces them today.)
enum ResourcePoolSyncState {
  SYNCED
  SYNCING
  PARTIAL
  FAILED
  NEVER
}

enum ResourcePoolSortField {
  NAME
  ENDPOINT
  CONNECTION_STATUS
  DATACENTER_COUNT
  CLUSTER_COUNT
  ESXI_HOST_COUNT
  VM_INSTANCE_COUNT
  CREATED_AT
  UPDATED_AT
}

type ResourcePool {
  id: ID!
  name: String!
  endpoint: String!
  # Content library the pool deploys OVA templates from (console 接入表单).
  contentLibraryName: String!
  # Skip vCenter TLS verification for this pool (self-signed/internal CA). LLD-13.
  insecure: Boolean!
  connectionStatus: PoolConnectionStatus!
  datacenterCount: Int!
  clusterCount: Int!
  esxiHostCount: Int!
  vmInstanceCount: Int!
  syncStatus: ResourcePoolSyncState!
  lastSyncedAt: Time
  createdAt: Time!
  updatedAt: Time!
}

type ResourcePoolConnection {
  nodes: [ResourcePool!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

input ResourcePoolFilter {
  nameKeyword: String
  endpointKeyword: String
  connectionStatus: PoolConnectionStatus
}

input ResourcePoolSort {
  field: ResourcePoolSortField!
  direction: SortDirection!
}

input CreateResourcePoolInput {
  name: String!
  endpoint: String!
  contentLibraryName: String
  datacenterCount: Int
  clusterCount: Int
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = false(默认验证)。LLD-13。
  insecure: Boolean
  # vCenter (JVC) 凭据(可选;真机连接必填,前端表单可后补)。后端写入 secret store
  # (Vaultwarden)并只存返回的引用,明文不落库;优先于 secretRef。
  username: String
  password: String
  # 已有 secret store 引用(高级/预置);与 username/password 二选一。
  secretRef: String
}

input UpdateResourcePoolInput {
  name: String
  endpoint: String
  contentLibraryName: String
  datacenterCount: Int
  clusterCount: Int
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = 不变。LLD-13。
  insecure: Boolean
  # 重填凭据(轮换):同 create,写 secret store 后只存引用。
  username: String
  password: String
  secretRef: String
}

type CreateResourcePoolPayload {
  pool: ResourcePool!
}

type UpdateResourcePoolPayload {
  pool: ResourcePool!
}

type DeleteResourcePoolPayload {
  id: ID!
  deletedName: String!
}

type SyncResourcePoolPayload {
  pool: ResourcePool!
  syncedAt: Time!
}

# Pre-save probe for the 接入表单. When username/password are supplied it performs
# a REAL authenticated probe (login → read vSphere version → verify the content
# library exists and count its items); without credentials it falls back to a
# lightweight reachability (TCP) check, as before. Credentials are used only for
# the probe — never persisted here (createResourcePool stores them).
input TestResourcePoolConnectionInput {
  name: String!
  endpoint: String!
  # vCenter 凭据。提供时执行真实认证探测并返回内容库列表;省略则退化为仅可达性 TCP 拨测(向后兼容)。
  # 明文不落库、不入日志。
  username: String
  password: String
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = false。与 CreateResourcePoolInput 一致。
  insecure: Boolean
}

type ResourcePoolConnectionTest {
  ok: Boolean!
  message: String!
  detail: ResourcePoolConnectionDetail
}

type ResourcePoolConnectionDetail {
  # 真实 vSphere 版本(带凭证探测时);仅可达性探测时为空字符串。
  vSphereVersion: String!
  # vCenter 上所有内容库名称列表(带凭证探测时返回);仅可达性探测时为空数组。
  contentLibraries: [String!]!
}

extend type Query {
  resourcePools(
    filter: ResourcePoolFilter
    pagination: Pagination
    sort: ResourcePoolSort
  ): ResourcePoolConnection! @hasRole(any: [admin])
  resourcePool(id: ID!): ResourcePool @hasRole(any: [admin])
}

extend type Mutation {
  createResourcePool(input: CreateResourcePoolInput!): CreateResourcePoolPayload! @hasRole(any: [admin])
  updateResourcePool(id: ID!, input: UpdateResourcePoolInput!): UpdateResourcePoolPayload! @hasRole(any: [admin])
  deleteResourcePool(id: ID!): DeleteResourcePoolPayload! @hasRole(any: [admin])
  # Lightweight pre-save reachability probe from the 接入表单 (no credentials):
  # validate the endpoint is well-formed and dial-reachable (0619 第13页 连接状态).
  testResourcePoolConnection(input: TestResourcePoolConnectionInput!): ResourcePoolConnectionTest! @hasRole(any: [admin])
  # Connect → count datacenters/clusters/hosts/VMs → persist (同步数据).
  syncResourcePool(id: ID!): SyncResourcePoolPayload! @hasRole(any: [admin])
}

mutation CreateModelGateway($input: ModelGatewayInput!) {
    createModelGateway(input: $input) {
      ...ModelGatewayFields
    }
  }
  
  fragment ModelGatewayFields on ModelGateway {
    id
    name
    provider
    endpoint
    status
    loadBalancingStrategy
    adminUrl
    lastSyncAt
    lastSyncStatus
    lastSyncMessage
    createdAt
    updatedAt
  }

mutation TestModelGatewayConnection($id: ID!) {
    testModelGatewayConnection(id: $id) {
      success
      status
      message
      testedAt
      gateway {
        ...ModelGatewayFields
      }
    }
  }
  
  fragment ModelGatewayFields on ModelGateway {
    id
    name
    provider
    endpoint
    status
    loadBalancingStrategy
    adminUrl
    lastSyncAt
    lastSyncStatus
    lastSyncMessage
    createdAt
    updatedAt
  }

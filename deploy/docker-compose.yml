# Local LiteLLM gateway (data plane) for end-to-end testing with the Go control
# plane. The backend pushes the model list via /model/new and mints virtual keys
# via /key/generate — so this config stays minimal (master key + DB) and the real
# gateway-integration code is what gets exercised.
#
# Ports are chosen to NOT clash with a native homebrew postgres (5432) or the dev
# stack's redis (6379): litellm=4000, its own postgres=5433.
#
# Usage:
#   cd deploy
#   cp .env.example .env        # then fill MINIMAX_API_KEY + a master key
#   docker compose up -d
#   # then in the backend console (模型网关接入):
#   #   endpoint=http://localhost:4000  master_key=<same as LITELLM_MASTER_KEY above>
#   # The backend does not consume LITELLM_BASE_URL / LITELLM_MASTER_KEY at startup
#   # — it reads the gateway from gateway_connections (LLD-13 §3.3).
#
# Grafana (port 3000) is auto-provisioned with the Prometheus datasource and
# the offline'd LiteLLM dashboard from
#   deploy/grafana/dashboards/litellm_dashboard.json
# so a fresh `docker compose up -d` lands you on a working dashboard at
# http://localhost:3000 (admin/admin by default — dev only; override below).
services:
  litellm:
    # Mirrored from litellm/litellm:v1.89.4 to quay.io/vmware-ai/litellm:v1.89.4
    # (avoids the poisoned 1.82.7/1.82.8 releases; pin to this digest in prod).
    image: quay.io/vmware-ai/litellm:v1.89.4
    container_name: litellm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://agentplatform_user:agentplatform_passwd@postgres:5432/litellm_db
      LITELLM_LOG: "INFO"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always

  postgres:
    image: quay.io/vmware-ai/postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: agentplatform  # litellm's db name is litellm_db
      POSTGRES_USER: agentplatform_user
      POSTGRES_PASSWORD: agentplatform_passwd
    ports:
      - "5433:5432" # 5433 host → avoid clashing with native/homebrew pg on 5432
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentplatform_user"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: always

  redis:
    image: quay.io/vmware-ai/redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: always

  litellm-prometheus:
    image: quay.io/vmware-ai/prometheus:v3.5.4
    container_name: litellm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - litellm_prom_data:/prometheus
    healthcheck:
      # wget is built into the prometheus image; probes the same /-/ready
      # endpoint the official healthcheck docs use.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always
    depends_on:
      - litellm

  grafana:
    # Auto-provisioned with the Prometheus datasource and the offline'd LiteLLM
    # dashboard. Reads provisioning/datasources/*.yml + provisioning/dashboards/*.yml
    # at startup; the dashboard provider re-scans the dashboards dir every 30s
    # so editing the JSON in place updates without a restart.
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Dev-only credentials (admin/admin). Override via GF_SECURITY_ADMIN_*
      # env vars or a mounted grafana.ini for anything non-local.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Provisioning is read-only — operators should edit files in the repo,
      # not the container's filesystem.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Persistence for grafana-internal state (dashboards saved via UI, users,
      # preferences). SQLite under /var/lib/grafana; survives container restarts.
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    depends_on:
      litellm-prometheus:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  litellm_prom_data:
  grafana_data:

# Agent Platform — GraphQL contract (single source of truth).
# Consumed by the frontend (agent-platform-web) via codegen. See LLD-01 §5.

scalar Time

enum Role {
  admin
  user
  observability
  tenant_admin
}

type User {
  id: ID!
  username: String!
  email: String!
  role: Role!
  tenantId: ID
  mustChangePassword: Boolean!
  isActive: Boolean!
  lastLoginAt: Time
  createdAt: Time!
}

type AuthPayload {
  user: User!
  mustChangePassword: Boolean!
}

type TempPasswordPayload {
  userId: ID!
  tempPassword: String!
}

type AuditLog {
  id: ID!
  actorUserId: ID
  action: String!
  resourceType: String
  resourceId: String
  ip: String
  result: String!
  detail: String
  createdAt: Time!
}

input AuditFilter {
  actorUserId: ID
  # action category prefix, e.g. "user." / "router." / "key." / "rate_limit."
  actionPrefix: String
  # substring match across action + resourceId
  search: String
}

input CreateUserInput {
  username: String!
  email: String!
  password: String!
  role: Role!
  tenantId: ID
}

input UpdateUserInput {
  email: String
  role: Role
}

input PageInput {
  limit: Int = 50
  offset: Int = 0
}

type UserConnection {
  items: [User!]!
  total: Int!
}

type AuditConnection {
  items: [AuditLog!]!
  total: Int!
}

type Query {
  me: User!
  users(page: PageInput): UserConnection! @hasRole(any: [admin, tenant_admin])
  auditLogs(filter: AuditFilter, page: PageInput): AuditConnection! @hasPermission(perm: "audit:view")
}

type Mutation {
  login(username: String!, password: String!): AuthPayload!
  logout: Boolean!
  changePassword(oldPassword: String!, newPassword: String!): Boolean!

  createUser(input: CreateUserInput!): User! @hasRole(any: [admin])
  updateUser(id: ID!, input: UpdateUserInput!): User! @hasRole(any: [admin])
  setUserActive(id: ID!, active: Boolean!): User! @hasRole(any: [admin])
  resetPassword(userId: ID!): TempPasswordPayload! @hasRole(any: [admin])
  deleteUser(id: ID!): Boolean! @hasRole(any: [admin])
}

directive @hasRole(any: [Role!]!) on FIELD_DEFINITION
directive @hasPermission(perm: String!) on FIELD_DEFINITION

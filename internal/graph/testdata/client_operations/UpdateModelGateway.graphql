mutation UpdateModelGateway($id: ID!, $input: ModelGatewayInput!) {
    updateModelGateway(id: $id, input: $input) {
      ...ModelGatewayFields
    }
  }
  
  fragment ModelGatewayFields on ModelGateway {
    id
    name
    provider
    endpoint
    status
    loadBalancingStrategy
    latencyMs
    adminUrl
    lastSyncAt
    lastSyncStatus
    lastSyncMessage
    createdAt
    updatedAt
  }

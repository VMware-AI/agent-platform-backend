# Resource pool (vCenter) registration + inventory. See LLD-03 / LLD-06, 0619 第13页.
# Shape aligned to the console 资源池 page (重蒙皮 P3): entity + connection + payloads.

# Inventory-sync state. Derived: never synced → NEVER; last sync ok → SYNCED;
# last sync errored → FAILED. (SYNCING/PARTIAL are part of the console enum but
# the backend's sync is synchronous, so it never produces them today.)
enum ResourcePoolSyncState {
  SYNCED
  SYNCING
  PARTIAL
  FAILED
  NEVER
}

enum ResourcePoolSortField {
  NAME
  ENDPOINT
  SYNC_STATUS
  CREATED_AT
  UPDATED_AT
}

# vCenter deployment candidate resource — minimum information for an OVA
# deployment target. Name is the vCenter display label; Path is the full
# inventory path (e.g. /DC0/host/DC0_C0/Resources) used by find.NewFinder.
# Path may be null when the resource is unambiguously identified by name.
type PlacementRef {
  name: String!
  path: String
}

# vSphere cluster (parented under a Datacenter's host folder).
type Cluster {
  name: String!
  path: String!
  esxiHosts: [PlacementRef!]!
  resourcePools: [PlacementRef!]!
}

# vSphere datacenter — top-level node of vCenter inventory.
# storagePolicies is a non-null list: a failed PBM pull and "no profiles"
# both surface as [] (the null-vs-[] distinction was never wired through;
# make the field nullable in a dedicated contract change if the console
# ever needs to tell them apart — see #98).
type DataCenter {
  name: String!
  path: String!
  clusters: [Cluster!]!
  datastores: [PlacementRef!]!
  networks: [PlacementRef!]!
  folders: [PlacementRef!]!
  storagePolicies: [PlacementRef!]!
}

type ResourcePool {
  id: ID!
  name: String!
  endpoint: String!
  # Content library the pool deploys OVA templates from (console 接入表单).
  contentLibraryName: String!
  # Skip vCenter TLS verification for this pool (self-signed/internal CA). LLD-13.
  insecure: Boolean!
  # vCenter inventory snapshot — full nested tree (DC > Cluster > Host > RP
  # plus datastores / networks / vm folders / storage policies). Synced by the
  # background ticker; consumed by the OVA deploy form for cascading dropdowns.
  datacenters: [DataCenter!]!
  syncStatus: ResourcePoolSyncState!
  lastSyncedAt: Time
  createdAt: Time!
  updatedAt: Time!
}

type ResourcePoolConnection {
  nodes: [ResourcePool!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

input ResourcePoolFilter {
  nameKeyword: String
  endpointKeyword: String
  syncStatus: ResourcePoolSyncState
}

input ResourcePoolSort {
  field: ResourcePoolSortField!
  direction: SortDirection!
}

input CreateResourcePoolInput {
  name: String!
  endpoint: String!
  contentLibraryName: String
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = false(默认验证)。LLD-13。
  insecure: Boolean
  # vCenter (JVC) 凭据(可选;真机连接必填,前端表单可后补)。后端加密写入 platform_secrets
  # 表(密文,AES-GCM)并只存返回的引用,明文不落库;优先于 secretRef。
  username: String
  password: String
  # 已有 secret store 引用(高级/预置);与 username/password 二选一。
  secretRef: String
}

input UpdateResourcePoolInput {
  name: String
  endpoint: String
  contentLibraryName: String
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = 不变。LLD-13。
  insecure: Boolean
  # 重填凭据(轮换):同 create,写 secret store 后只存引用。
  username: String
  password: String
  secretRef: String
}

type CreateResourcePoolPayload {
  pool: ResourcePool!
}

type UpdateResourcePoolPayload {
  pool: ResourcePool!
}

type DeleteResourcePoolPayload {
  id: ID!
  deletedName: String!
}

type SyncResourcePoolPayload {
  pool: ResourcePool!
  syncedAt: Time!
}

# Pre-save probe for the 接入表单. When username/password are supplied it performs
# a REAL authenticated probe (login → read vSphere version → verify the content
# library exists and count its items); without credentials it falls back to a
# lightweight reachability (TCP) check, as before. Credentials are used only for
# the probe — never persisted here (createResourcePool stores them).
input TestResourcePoolConnectionInput {
  name: String!
  endpoint: String!
  # vCenter 凭据。提供时执行真实认证探测并返回内容库列表;省略则退化为仅可达性 TCP 拨测(向后兼容)。
  # 明文不落库、不入日志。
  username: String
  password: String
  # 跳过 vCenter TLS 验证(自签名/内网 CA);省略 = false。与 CreateResourcePoolInput 一致。
  insecure: Boolean
}

type ResourcePoolConnectionTest {
  ok: Boolean!
  message: String!
  detail: ResourcePoolConnectionDetail
}

type ResourcePoolConnectionDetail {
  # 真实 vSphere 版本(带凭证探测时);仅可达性探测时为空字符串。
  vSphereVersion: String!
  # vCenter 上所有内容库名称列表(带凭证探测时返回);仅可达性探测时为空数组。
  contentLibraries: [String!]!
}

# A single item (OVF/OVA package) inside a vCenter content library.
# Name is used directly as ovaIdentifier when creating an OvaTemplateVersion.
type ContentLibraryItem {
  name: String!
  type: String!
}

extend type Query {
  resourcePools(
    filter: ResourcePoolFilter
    pagination: Pagination
    sort: ResourcePoolSort
  ): ResourcePoolConnection! @hasRole(any: [admin])
  resourcePool(id: ID!): ResourcePool @hasRole(any: [admin])
  # List all content libraries available on the given resource pool's vCenter.
  # Used by the Add OVA Template dialog to populate the library picker.
  contentLibraries(resourcePoolId: ID!): [String!]! @hasRole(any: [admin])
  # List OVA items in the named content library of the given resource pool.
  # Used by the Add OVA Template dialog to populate the template picker.
  contentLibraryItems(resourcePoolId: ID!, libraryName: String!): [ContentLibraryItem!]! @hasRole(any: [admin])
}

extend type Mutation {
  createResourcePool(input: CreateResourcePoolInput!): CreateResourcePoolPayload! @hasRole(any: [admin])
  updateResourcePool(id: ID!, input: UpdateResourcePoolInput!): UpdateResourcePoolPayload! @hasRole(any: [admin])
  deleteResourcePool(id: ID!): DeleteResourcePoolPayload! @hasRole(any: [admin])
  # Lightweight pre-save reachability probe from the 接入表单 (no credentials):
  # validate the endpoint is well-formed and dial-reachable (0619 第13页 连接状态).
  testResourcePoolConnection(input: TestResourcePoolConnectionInput!): ResourcePoolConnectionTest! @hasRole(any: [admin])
  # Connect → fetch inventory tree → persist (同步数据).
  syncResourcePool(id: ID!): SyncResourcePoolPayload! @hasRole(any: [admin])
}
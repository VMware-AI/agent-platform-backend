# Agent center (智能体中心): catalog/market, configs, and deployed instances.
# See doc 42 (E line) concept + 0619 mockups.

enum InstallMethod {
  offline_tar
  curl
  unset
}

enum AgentTemplateStatus {
  active
  deferred
}

enum AgentStatus {
  provisioning
  running
  stopped
  exception
}

type AgentTemplate {
  id: ID!
  kind: String!
  display: String!
  description: String
  installMethod: InstallMethod!
  installCommand: String
  status: AgentTemplateStatus!
  version: String
  # OKF knowledge-grounding convention per kind (LLD-11 K4). knowledgeRoot = VM
  # unpack dir for mounted packs; knowledgePrompt = the "consult local knowledge
  # index.md first" system-prompt snippet (非 RAG).
  knowledgeRoot: String
  knowledgePrompt: String
  createdAt: Time!
}

type AgentConfig {
  id: ID!
  name: String!
  agentType: String!
  isDefault: Boolean!
  # The default_config artifact this config pulls (LLD-09 inline content); lets the
  # 智能体配置 edit form preselect the current artifact. Null when none is set.
  artifactId: ID
  # OKF knowledge packs mounted on this config (N:M, LLD-11 K2). Sent to the agent
  # VM at deploy; the daemon pulls each over the control-plane channel (非 RAG).
  # Lazily resolved (loads the edge only when selected).
  knowledge: [Artifact!]! @goField(forceResolver: true)
  createdAt: Time!
}

type Agent {
  id: ID!
  name: String!
  # type = the agent's catalog kind (goose/xiaoguai/…); typeLabel = the template's
  # display name for that kind (前后端整合契约). type replaces the old agentType.
  type: String!
  typeLabel: String! @goField(forceResolver: true)
  status: AgentStatus!
  # apiKey/owner are resolved lazily from the agent's virtual_key_id / owner_user_id.
  apiKey: AgentApiKey @goField(forceResolver: true)
  owner: User @goField(forceResolver: true)
  # endpoint = the VM ref (moRef/name); null until deployed.
  endpoint: String
  # Catalog provenance, set when the agent was deployed from an OVA version (智能体
  # 市场 deploy). Null for agents created directly via createAgent.
  templateFamilyId: ID
  templateVersionId: ID
  # The vCenter resource pool the agent's VM lives in (set at deploy). Null until deployed.
  resourcePoolId: ID
  # Run-as credentials for the agent's VM. Currently sources `username` from the
  # owning user (the agent has no separate OS account today); resolver-computed.
  credentials: AgentCredentials @goField(forceResolver: true)
  createdAt: Time!
  updatedAt: Time!
}

# A virtual gateway key as shown on the agent list (id + display alias).
type AgentApiKey {
  id: ID!
  name: String!
}

# Run-as credentials surfaced for a deployed agent. Only `username` is exposed;
# the password is never returned by the API (it is a Sensitive VM secret).
type AgentCredentials {
  username: String!
}

# Connection wrapper for the paged/filtered/sorted agent list (前后端整合契约).
type AgentConnection {
  nodes: [Agent!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

type PageInfo {
  page: Int!
  pageSize: Int!
  totalPages: Int!
}

input Pagination {
  page: Int! = 1
  pageSize: Int! = 10
}

input AgentFilter {
  status: AgentStatus
  type: String # = agent kind
  nameKeyword: String # substring match on name
  keyKeyword: String # substring match on apiKey.name (virtual_key alias)
  ownerKeyword: String # substring match on owner.username / owner.email
}

enum AgentSortField {
  NAME
  TYPE
  STATUS
  API_KEY_NAME
  OWNER
  CREATED_AT
  UPDATED_AT
}

enum SortDirection {
  ASC
  DESC
}

input AgentSort {
  field: AgentSortField!
  direction: SortDirection!
}

input UpsertAgentTemplateInput {
  kind: String!
  display: String!
  description: String
  installMethod: InstallMethod!
  installCommand: String
  status: AgentTemplateStatus!
  version: String
  # OKF grounding convention (LLD-11 K4); operators may override the seeded defaults.
  knowledgeRoot: String
  knowledgePrompt: String
}

input CreateAgentInput {
  name: String!
  agentType: String!
  configId: ID
  resourcePoolId: ID
}

input CreateAgentConfigInput {
  name: String!
  agentType: String!
  isDefault: Boolean
  artifactId: ID
}
input UpdateAgentConfigInput {
  name: String
  artifactId: ID
}

extend type Query {
  # Catalog and configs are browsable by any authenticated user.
  agentTemplates: [AgentTemplate!]!
  agentConfigs(agentType: String): [AgentConfig!]!
  # Admin + read_only see all agents; a regular user only their own (owner scope).
  # Paged/filtered/sorted connection (前后端整合契约).
  agents(filter: AgentFilter, pagination: Pagination, sort: AgentSort): AgentConnection!
    @hasRole(any: [admin, read_only, user])
}

extend type Mutation {
  # Catalog management is admin-only.
  upsertAgentTemplate(input: UpsertAgentTemplateInput!): AgentTemplate! @hasRole(any: [admin])
  # Self-service: any authenticated user creates their own agent (owner = caller).
  createAgent(input: CreateAgentInput!): Agent!
  setAgentStatus(id: ID!, status: AgentStatus!): Agent!

  # Agent config management (智能体配置).
  createAgentConfig(input: CreateAgentConfigInput!): AgentConfig! @hasRole(any: [admin])
  updateAgentConfig(id: ID!, input: UpdateAgentConfigInput!): AgentConfig! @hasRole(any: [admin])
  deleteAgentConfig(id: ID!): Boolean! @hasRole(any: [admin])
  # Mark this config the default for its agent type (unsets others of that type).
  setDefaultAgentConfig(id: ID!): AgentConfig! @hasRole(any: [admin])
  # Replace the config's mounted OKF knowledge packs (LLD-11 K2). Each id must be a
  # kind=knowledge artifact visible to the caller's tenant; the set is replaced wholesale.
  setAgentConfigKnowledge(configId: ID!, knowledgeArtifactIds: [ID!]!): AgentConfig!
    @hasRole(any: [admin])
}

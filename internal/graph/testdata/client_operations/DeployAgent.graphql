fragment OvaTemplateVersionFields on OvaTemplateVersion {
    id
    familyId
    version
    ovaIdentifier
    notes
    createdAt
  }

  mutation DeployAgent($input: DeployAgentInput!) {
    deployAgent(input: $input) {
      agent {
        id
        name
        type
        status
        endpoint
        createdAt
        updatedAt
        apiKey {
          id
          name
        }
        credentials {
          username
        }
        templateFamilyId
        templateVersionId
        resourcePoolId
      }
      virtualKeySecret
      templateVersion {
        ...OvaTemplateVersionFields
      }
      resourcePool {
        id
        name
        endpoint
        syncStatus
        lastSyncedAt
        datacenters {
          name
        }
      }
    }
  }

# Request logs (请求日志) + rate-limit policies (限流策略). 0619.

type RequestLog {
  id: ID!
  requestId: String!
  userId: ID
  agentId: ID
  model: String
  inputTokens: Int!
  outputTokens: Int!
  latencyMs: Int!
  statusCode: Int!
  detail: String
  createdAt: Time!
}

input RecordRequestLogInput {
  requestId: String!
  userId: ID
  agentId: ID
  model: String
  inputTokens: Int
  outputTokens: Int
  latencyMs: Int
  statusCode: Int!
  detail: String
}

input RequestLogFilter {
  statusCode: Int
  agentId: ID
  model: String
  requestId: String
}

enum RequestMetricsBucketGranularity { MINUTE HOUR DAY }

type RequestMetricsBucket {
  timestamp: Time!
  requestCount: Int!
  errorCount: Int!
  avgLatencyMs: Int!
  p95LatencyMs: Int!
  inputTokensTotal: Int!
  outputTokensTotal: Int!
}

type RequestMetricsSummary {
  totalRequests: Int!
  totalErrors: Int!
  errorRate: Float!
  avgLatencyMs: Int!
  p50LatencyMs: Int!
  p95LatencyMs: Int!
  p99LatencyMs: Int!
  totalInputTokens: Int!
  totalOutputTokens: Int!
}

# One upstream deployment's health as litellm reports it (GET /health).
type EndpointHealth {
  model: String!
  apiBase: String
}

# A gateway's health, aggregated by the backend fanning out to litellm's
# /health (LLD-15 T4). reachable reflects /health/readiness; the endpoint lists
# come from /health (litellm probes its upstreams).
type GatewayHealth {
  gatewayId: ID!
  gatewayName: String!
  reachable: Boolean!
  healthyCount: Int!
  unhealthyCount: Int!
  healthy: [EndpointHealth!]!
  unhealthy: [EndpointHealth!]!
  error: String
}

type RequestMetrics {
  rangeStart: Time!
  rangeEnd: Time!
  granularity: RequestMetricsBucketGranularity!
  buckets: [RequestMetricsBucket!]!
  summary: RequestMetricsSummary!
}

input RequestMetricsFilter {
  statusCode: Int
  agentId: ID
  model: String
}

type RateLimitPolicy {
  id: ID!
  name: String!
  rpm: Int
  tpm: Int
  enabled: Boolean!
  createdAt: Time!
}

input UpsertRateLimitPolicyInput {
  name: String!
  rpm: Int
  tpm: Int
  enabled: Boolean
}

extend type Query {
  requestLogs(filter: RequestLogFilter, page: PageInput): [RequestLog!]! @hasPermission(perm: "audit:view")
  rateLimitPolicies: [RateLimitPolicy!]! @hasRole(any: [admin])
  requestMetrics(from: Time!, to: Time!, granularity: RequestMetricsBucketGranularity!, filter: RequestMetricsFilter): RequestMetrics! @hasPermission(perm: "audit:view")
  # Upstream health across every configured gateway (fan-out to litellm /health).
  gatewayHealth: [GatewayHealth!]! @hasPermission(perm: "audit:view")
}

extend type Mutation {
  recordRequestLog(input: RecordRequestLogInput!): RequestLog! @hasRole(any: [admin])
  upsertRateLimitPolicy(input: UpsertRateLimitPolicyInput!): RateLimitPolicy! @hasPermission(perm: "route:manage")
  setRateLimitPolicyEnabled(id: ID!, enabled: Boolean!): RateLimitPolicy! @hasPermission(perm: "route:manage")
  # Delete a policy. Refused while any non-revoked virtual key still references it
  # (reassign/revoke those keys first) so bound keys never silently lose their limits.
  deleteRateLimitPolicy(id: ID!): Boolean! @hasPermission(perm: "route:manage")
}

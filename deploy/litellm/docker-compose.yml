# Local LiteLLM gateway (data plane) for end-to-end testing with the Go control
# plane. The backend pushes the model list via /model/new and mints virtual keys
# via /key/generate — so this config stays minimal (master key + DB) and the real
# gateway-integration code is what gets exercised.
#
# Ports are chosen to NOT clash with a native homebrew postgres (5432) or the dev
# stack's redis (6379): litellm=4000, its own postgres=5433.
#
# Usage:
#   cd deploy/litellm
#   cp .env.example .env        # then fill MINIMAX_API_KEY + a master key
#   docker compose up -d
#   # backend: LITELLM_BASE_URL=http://localhost:4000 LITELLM_MASTER_KEY=<same> make run
services:
  litellm:
    # ⚠️ Pin a digest in any shared/prod use and EXCLUDE the poisoned 1.82.7/1.82.8
    # releases (see design research/litellm-proxy-deployment-and-api §1.4).
    image: ghcr.io/berriai/litellm:main-stable
    depends_on:
      litellm-postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://litellm:litellm@litellm-postgres:5432/litellm
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  litellm-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    ports:
      - "5433:5432" # 5433 host → avoid clashing with native/homebrew pg on 5432
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  litellm_pgdata:

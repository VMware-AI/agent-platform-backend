mutation RegisterGatewayConnectionEntry($input: RegisterGatewayConnectionInput!) {
    registerGatewayConnection(input: $input) {
      ...GatewayConnectionEntryFields
    }
  }
  
  fragment GatewayConnectionEntryFields on GatewayConnection {
    id
    name
    endpoint
    status
    loadBalanceStrategy
    createdAt
  }

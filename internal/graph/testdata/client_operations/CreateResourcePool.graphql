fragment ResourcePoolFields on ResourcePool {
    id
    name
    endpoint
    contentLibraryName
    insecure
    connectionStatus
    esxiHostCount
    vmInstanceCount
    syncStatus
    lastSyncedAt
    createdAt
    updatedAt
  }

  mutation CreateResourcePool($input: CreateResourcePoolInput!) {
    createResourcePool(input: $input) {
      pool {
        ...ResourcePoolFields
      }
    }
  }

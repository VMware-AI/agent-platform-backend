name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: docs in sync with schema
        # Regenerate the merged SDL + API reference from schema/*.graphql and fail
        # if either drifted from what's committed (schema changed but docs weren't
        # regenerated). Fix locally with `make docs`.
        run: make docs-check

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test ./... -count=1

      - name: build
        run: go build ./...

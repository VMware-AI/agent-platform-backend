fragment ResourcePoolFields on ResourcePool {
    id
    name
    endpoint
    contentLibraryName
    insecure
    connectionStatus
    esxiHostCount
    vmInstanceCount
    syncStatus
    lastSyncedAt
    createdAt
    updatedAt
  }

  mutation UpdateResourcePool($id: ID!, $input: UpdateResourcePoolInput!) {
    updateResourcePool(id: $id, input: $input) {
      pool {
        ...ResourcePoolFields
      }
    }
  }

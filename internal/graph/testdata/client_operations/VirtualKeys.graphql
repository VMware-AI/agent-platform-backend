query VirtualKeys($agentName: String) {
    virtualKeys(agentName: $agentName) {
      ...VirtualKeyFields
    }
  }

  # See IssueVirtualKey.graphql for the canonical VirtualKeyFields fragment.
  fragment VirtualKeyFields on VirtualKey {
    id
    name
    maskedKey
    userId
    agent {
      id
    }
    modelGateway {
      id
      name
      provider
      endpoint
    }
    models
    status
    keyType
    blocked
    expiresAt
    duration
    lastActiveAt
    spend
    maxBudget
    budgetDuration
    maxParallelRequests
    rpmLimit
    tpmLimit
    rpmLimitType
    tpmLimitType
    allowedRoutes
    tags
    autoRotate
    rotationInterval
    createdAt
    updatedAt
  }

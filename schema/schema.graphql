# Agent Platform — GraphQL contract (single source of truth).
# Consumed by the frontend (agent-platform-console). See LLD-01 §5.

scalar Time
# Free-form JSON object (gqlgen built-in) — used for Artifact metadata (LLD-06).
scalar Map

# Platform role enum (用于 @hasRole 鉴权 + User.role). Renamed from `Role` so the
# frontend-facing `Role` *entity* (in account.graphql) can own that name (前后端整合).
enum RoleName {
  admin
  user
  observability
  tenant_admin
}

type User {
  id: ID!
  username: String!
  # Human-friendly name for display (前后端整合契约). Defaults to username until a
  # dedicated display-name field exists.
  displayName: String! @goField(forceResolver: true)
  email: String!
  role: RoleName!
  tenantId: ID
  mustChangePassword: Boolean!
  isActive: Boolean!
  lastLoginAt: Time
  createdAt: Time!
}

type AuthPayload {
  # Bearer token (= session id). The client stores it and sends it as
  # `Authorization: Bearer <token>` on subsequent requests (前后端整合:token 认证).
  token: String!
  user: User!
  mustChangePassword: Boolean!
}

input LoginInput {
  # The console login form collects an email; the backend accepts username or email.
  email: String!
  password: String!
  # When false, the session cookie is a session cookie (cleared on browser close);
  # when true or omitted, it persists for the session TTL ("remember me").
  remember: Boolean
}

type AuditLog {
  id: ID!
  actorUserId: ID
  action: String!
  resourceType: String
  resourceId: String
  ip: String
  result: String!
  detail: String
  createdAt: Time!
}

input AuditFilter {
  actorUserId: ID
  # action category prefix, e.g. "user." / "router." / "key." / "rate_limit."
  actionPrefix: String
  # substring match across action + resourceId
  search: String
}

input PageInput {
  limit: Int = 50
  offset: Int = 0
}

type AuditConnection {
  items: [AuditLog!]!
  total: Int!
}

type Query {
  me: User!
  auditLogs(filter: AuditFilter, page: PageInput): AuditConnection! @hasPermission(perm: "audit:view")
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
  changePassword(oldPassword: String!, newPassword: String!): Boolean!
}

directive @hasRole(any: [RoleName!]!) on FIELD_DEFINITION
directive @hasPermission(perm: String!) on FIELD_DEFINITION
# gqlgen codegen directive (not auto-injected in this version): forces a field to
# be a resolver method instead of a plain model field — used for lazy edge loads.
directive @goField(
  forceResolver: Boolean
  name: String
  omittable: Boolean
) on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

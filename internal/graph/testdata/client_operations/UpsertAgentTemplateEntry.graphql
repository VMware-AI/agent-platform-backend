mutation UpsertAgentTemplateEntry($input: UpsertAgentTemplateInput!) {
    upsertAgentTemplate(input: $input) {
      ...AgentTemplateFields
    }
  }
  
  fragment AgentTemplateFields on AgentTemplate {
    id
    kind
    display
    description
    installMethod
    installCommand
    status
    version
    knowledgeRoot
    knowledgePrompt
    createdAt
  }

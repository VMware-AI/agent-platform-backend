fragment ResourcePoolFields on ResourcePool {
    id
    name
    endpoint
    contentLibraryName
    insecure
    syncStatus
    lastSyncedAt
    createdAt
    updatedAt
  }

  mutation SyncResourcePool($id: ID!) {
    syncResourcePool(id: $id) {
      pool {
        ...ResourcePoolFields
      }
      syncedAt
    }
  }

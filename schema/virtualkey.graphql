# Per-user LiteLLM virtual keys. See LLD-04 / LLD-07 §8. Secret returned ONCE on issue.

enum VirtualKeyStatus {
  active
  disabled
  revoked
}

type VirtualKey {
  id: ID!
  alias: String
  userId: ID!
  agentId: ID
  rateLimitPolicyId: ID
  teamId: String
  models: [String!]!
  maxBudget: Float
  status: VirtualKeyStatus!
  expiresAt: Time
  createdAt: Time!
}

# Returned only at issue time — carries the secret, which is never queryable again.
type IssuedVirtualKey {
  virtualKey: VirtualKey!
  secret: String!
}

input IssueVirtualKeyInput {
  userId: ID!
  agentId: ID
  # Associated rate-limit policy; its rpm/tpm are applied to the litellm key.
  rateLimitPolicyId: ID
  teamId: String
  models: [String!]
  maxBudget: Float
  rpmLimit: Int
  tpmLimit: Int
  alias: String
}

extend type Query {
  virtualKeys(userId: ID): [VirtualKey!]! @hasRole(any: [admin])
}

extend type Mutation {
  issueVirtualKey(input: IssueVirtualKeyInput!): IssuedVirtualKey! @hasPermission(perm: "key:manage")
  revokeVirtualKey(id: ID!): Boolean! @hasPermission(perm: "key:manage")
  # Toggle enabled/disabled (distinct from revoke, which is terminal).
  setVirtualKeyEnabled(id: ID!, enabled: Boolean!): VirtualKey! @hasPermission(perm: "key:manage")
}
